[storage]
database_path = "runtime/agentos.db"

[workspace]
root_path = "runtime/workspaces"
artifact_path = "runtime/artifacts"

[llm]
provider = "none"
endpoint_env = "AGENTOS_LLM_ENDPOINT"
api_key_env = "OPENAI_API_KEY"
model_env = "AGENTOS_LLM_MODEL"
temperature = 0.2
timeout_seconds = 60

[routing]
min_confidence = 0.25
skill_weight = 0.46
experience_weight = 0.16
availability_weight = 0.14
load_weight = 0.12
performance_weight = 0.12

[monitoring]
stale_hours = 24

